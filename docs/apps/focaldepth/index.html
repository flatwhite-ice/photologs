<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FocalDepth · 포맷 환산기 · photologs</title>
  <meta name="description" content="FocalDepth — 필름·센서 포맷의 화각과 심도를 135 풀프레임 기준으로 환산하는 사진가용 계산기">
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="src/app.css">
  <script src="../../shared/theme.js"></script>
</head>
<body>
  <script src="../../shared/nav.js" data-home="../../releases/" data-brand="photologs"></script>

  <main class="wrap wrap--wide app">
    <header class="app__intro">
      <p class="app__kicker">FocalDepth</p>
      <h1>포맷 환산기</h1>
      <p>필름·센서 포맷의 <strong>화각</strong>과 <strong>심도</strong>를 135 풀프레임 기준으로 환산합니다.</p>
    </header>

    <div class="app__grid">
      <!-- 입력 -->
      <section class="panel sticky inputs">
        <div class="field">
          <label for="format">포맷</label>
          <select id="format" aria-label="포맷 선택"></select>
          <div class="hint" id="format-note"></div>
        </div>

        <div class="field">
          <label for="focal">초점거리 (mm)</label>
          <div class="combo">
            <input type="number" id="focal" min="1" max="2000" step="0.1" value="58">
            <input type="range" id="focal-range" min="1" max="600" step="1" value="58">
          </div>
        </div>

        <div class="field">
          <label for="fnumber">조리개 (f)</label>
          <div class="combo">
            <input type="number" id="fnumber" min="0.5" max="128" step="0.1" value="5.6" list="stops">
            <input type="range" id="fnumber-range" min="0" max="12" step="1" value="5">
          </div>
          <datalist id="stops">
            <option value="1.0"></option><option value="1.4"></option><option value="2.0"></option>
            <option value="2.8"></option><option value="4.0"></option><option value="5.6"></option>
            <option value="8"></option><option value="11"></option><option value="16"></option>
            <option value="22"></option><option value="32"></option><option value="45"></option>
            <option value="64"></option>
          </datalist>
        </div>

        <details class="advanced" id="advanced">
          <summary>고급 · 실제 심도 계산</summary>
          <div class="field">
            <label for="distance">초점 맞춘 거리 (m)</label>
            <div class="combo">
              <input type="number" id="distance" min="0.1" max="1000" step="0.1" value="3">
              <input type="range" id="distance-range" min="0.1" max="50" step="0.1" value="3">
            </div>
            <div class="hint" id="coc-hint"></div>
          </div>
        </details>
      </section>

      <!-- 결과 -->
      <section class="results">
        <div class="headline">
          <div class="stat stat--accent">
            <div class="stat__label">환산 초점거리 (FF)</div>
            <div class="stat__value" id="r-focal">—</div>
            <div class="stat__sub" id="r-focal-sub"></div>
          </div>
          <div class="stat stat--accent">
            <div class="stat__label">환산 조리개 (심도 등가)</div>
            <div class="stat__value" id="r-aperture">—</div>
            <div class="stat__sub" id="r-aperture-sub"></div>
          </div>
        </div>

        <div class="panel">
          <p class="panel__title">화각 / 포맷 <span id="est-flag"></span></p>
          <div class="rows">
            <div class="row"><span class="row__k">크롭 팩터</span><span class="row__v" id="r-crop">—</span></div>
            <div class="row"><span class="row__k">포맷 대각</span><span class="row__v" id="r-diag">—</span></div>
            <div class="row"><span class="row__k">화각 · 장변</span><span class="row__v" id="r-aov-long">—</span></div>
            <div class="row"><span class="row__k">화각 · 단변</span><span class="row__v" id="r-aov-short">—</span></div>
            <div class="row"><span class="row__k">화각 · 대각</span><span class="row__v" id="r-aov-diag">—</span></div>
          </div>
        </div>

        <div class="panel">
          <p class="panel__title">프레임 비교 (vs 풀프레임)</p>
          <svg class="viz" id="viz" viewBox="0 0 400 220" role="img" aria-label="포맷 대 풀프레임 프레임 비교"></svg>
        </div>

        <div class="panel" id="dof-panel" hidden>
          <p class="panel__title">실제 심도 · 초점 <span id="dof-dist"></span></p>
          <div class="rows">
            <div class="row"><span class="row__k">과초점 거리</span><span class="row__v" id="r-hyper">—</span></div>
            <div class="row"><span class="row__k">근점 (선명 시작)</span><span class="row__v" id="r-near">—</span></div>
            <div class="row"><span class="row__k">원점 (선명 끝)</span><span class="row__v" id="r-far">—</span></div>
            <div class="row"><span class="row__k">심도 폭</span><span class="row__v" id="r-depth">—</span></div>
          </div>
          <div class="hint" style="margin-top:10px">착란원(CoC) <span id="r-coc"></span> · 포맷 대각÷1500 기준</div>
        </div>
      </section>
    </div>

    <details class="notes">
      <summary>데이터 출처 · 주석</summary>
      <ul id="notes-list"></ul>
    </details>
  </main>

  <script src="src/convert.js"></script>
  <script src="src/formats.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
